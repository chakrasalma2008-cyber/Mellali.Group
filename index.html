<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mellali Group</title>
  <link rel="icon" type="image/png" href="melGroupe.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #080c10;
      --accent: #4ecdc4;
      --text: #e8ede8;
      --muted: rgba(232, 237, 232, 0.5);
      --border: rgba(255, 255, 255, 0.08);
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(78, 205, 196, 0.1) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      pointer-events: none;
      animation: pulse 6s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: .7;
      }

      50% {
        transform: translate(-50%, -50%) scale(1.15);
        opacity: 1;
      }
    }

    .wrap {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeUp .8s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 48px;
    }

    /* ── Logo : placeholder ── */
    .logo-placeholder {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(78, 205, 196, 0.15), rgba(78, 205, 196, 0.04));
      border: 2px solid rgba(78, 205, 196, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 58px;
      margin-bottom: 22px;
      animation: glow 3s ease-in-out infinite alternate;
    }

    /* ── Logo : vraie image (décommenter quand vous avez la photo) ── */

    .logo-img {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(78, 205, 196, 0.3);
      margin-bottom: 22px;
      animation: glow 3s ease-in-out infinite alternate;
    }


    @keyframes glow {
      from {
        box-shadow: 0 0 20px rgba(78, 205, 196, 0.1);
      }

      to {
        box-shadow: 0 0 60px rgba(78, 205, 196, 0.3);
      }
    }

    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 600;
      letter-spacing: 5px;
      text-transform: uppercase;
    }

    .brand-name span {
      color: var(--accent);
    }

    .brand-tag {
      font-size: 12px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 6px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 320px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 17px 28px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 500;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: all .35s;
      width: 100%;
    }

    .btn-reserve {
      background: var(--accent);
      color: #000;
      box-shadow: 0 8px 30px rgba(78, 205, 196, 0.25);
    }

    .btn-reserve:hover {
      background: #3bbdb5;
      transform: translateY(-3px);
      box-shadow: 0 16px 40px rgba(78, 205, 196, 0.35);
    }

    .btn-call {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-call:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-3px);
    }

    .btn-wa {
      background: rgba(37, 211, 102, 0.1);
      color: #25D366;
      border: 1px solid rgba(37, 211, 102, 0.25);
    }

    .btn-wa:hover {
      background: rgba(37, 211, 102, 0.18);
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(37, 211, 102, 0.15);
    }

    .footer {
      position: fixed;
      bottom: 24px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 1px;
    }
  </style>
</head>

<body>

  <div class="wrap">
    <div class="logo-zone">
      <img class="logo-img" src="mel projet.jpeg">

      <div class="brand-name">Mellali<span>.</span></div>
      <div class="brand-tag">Nettoyage professionnel</div>
    </div>

    <div class="buttons">
      <a href="reservation.html" class="btn btn-reserve">📅 Réserver</a>
      <a href="tel:+212603590545" class="btn btn-call">📞 Appeler</a>
      <a href="https://wa.me/212687724430" class="btn btn-wa" target="_blank">💬 WhatsApp</a>
    </div>
  </div>

  <div class="footer">Mellali Group · Dakhla</div>

</body>

</html>
